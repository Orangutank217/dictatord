name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libx11-dev \
            libxdo-dev \
            libasound2-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --release

      - name: Package release
        run: |
          ARCHIVE_NAME="dictatord-${{ github.ref_name }}-x86_64-linux"
          mkdir -p "$ARCHIVE_NAME"
          cp target/release/dictatord "$ARCHIVE_NAME/"
          cp install.sh "$ARCHIVE_NAME/"
          cp uninstall.sh "$ARCHIVE_NAME/"
          cp Makefile "$ARCHIVE_NAME/"
          cp -r sounds "$ARCHIVE_NAME/"
          cp -r config "$ARCHIVE_NAME/"
          cp -r systemd "$ARCHIVE_NAME/"
          cp README.md "$ARCHIVE_NAME/"
          cp LICENSE "$ARCHIVE_NAME/"
          tar czf "$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME/"
          echo "Package created: $ARCHIVE_NAME.tar.gz"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dictatord-*-x86_64-linux.tar.gz
          generate_release_notes: true
